- pipeline: release-to-wp-svn
  name: Release to WP-SVN
  fail_on_prepare_env_warning: true
  events:
  - type: WEBHOOK
  actions:
  - action: Run PHP tests
    type: BUILD
    disabled: true
    execute_commands:
    - composer validate
    - composer install
    - vendor/bin/pest
    setup_commands:
    - echo "memory_limit=-1" >> /usr/local/etc/php/conf.d/buddy.ini
    - apt-get update && apt-get install -y git zip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - ""
    - "# php ext gd"
    - apt-get install -y libfreetype6-dev
    - apt-get install -y libjpeg62-turbo-dev
    - apt-get install -y libpng-dev
    - docker-php-ext-configure gd --with-freetype --with-jpeg
    - docker-php-ext-install gd
    - ""
    - "# php ext pdo_mysql"
    - docker-php-ext-configure pdo_mysql --with-pdo-mysql
    - docker-php-ext-install pdo_mysql
    - ""
    - "# php ext zip"
    - apt-get install -y zip
    - apt-get install -y unzip
    - apt-get install -y zlib1g-dev
    - apt-get install -y libzip-dev
    - docker-php-ext-install zip
    shell: BASH
    docker_image_name: library/php
    docker_image_tag: 8.5
  - action: Upload to WP SVN
    type: BUILD
    disabled: true
    execute_commands:
    - set -ex
    - ""
    - "# Step 1: Ensure we have an SVN trunk working copy"
    - "if [ -d \"/tmp/svn-trunk/.svn\" ]; then"
    - '  echo "SVN working copy found. Updating..."'
    - '  svn up "/tmp/svn-trunk" \'
    - "    --username ${WP_SVN_USERNAME} --password ${WP_SVN_PASSWORD} \\"
    - '    --non-interactive --trust-server-cert'
    - else
    - '  echo "No SVN working copy found. Checking out trunk..."'
    - '  mkdir -p "/tmp/svn-trunk"'
    - ' svn checkout "https://plugins.svn.wordpress.org/skwirrel-pim-sync/trunk" "/tmp/svn-trunk"  \'
    - "    --username ${WP_SVN_USERNAME} --password ${WP_SVN_PASSWORD} \\"
    - '    --non-interactive --trust-server-cert'
    - fi
    - ""
    - "# Step 2: Sync only the files we want into SVN"
    - rsync -av --delete \
    - '  --exclude=''.svn'' \'
    - '  --include=''skwirrel-pim-sync.php'' \'
    - '  --include=''readme.txt'' \'
    - '  --include=''assets/***'' \'
    - '  --include=''includes/***'' \'
    - '  --include=''templates/***'' \'
    - '  --include=''languages/***'' \'
    - '  --exclude=''*'' \'
    - '  "$BUDDY_PIPELINE_WORKSPACE/" "/tmp/svn-trunk/"'
    - ""
    - "# Step 3: Stage and commit changes"
    - cd "/tmp/svn-trunk"
    - svn add --force .
    - "svn status | grep '^\\!' | awk '{print $2}' | xargs -r svn rm"
    - ""
    - svn commit -m "Deploy new version" \
    - "  --username ${WP_SVN_USERNAME} --password ${WP_SVN_PASSWORD} \\"
    - '  --non-interactive --trust-server-cert'
    setup_commands:
    - apt-get update -qq && apt-get install -y -qq subversion rsync
    shell: BASH
    docker_image_name: buddy/localshell
    docker_image_tag: ubuntu_24.04
